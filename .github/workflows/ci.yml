name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    name: import & build (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache pretrained weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: torch-hub-${{ runner.os }}

      - name: Install (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Compile all modules
        run: python -m py_compile deep_contourflow/*.py deep_contourflow/models/*.py

      - name: Smoke test (import + instantiate)
        run: |
          python - <<'PY'
          from deep_contourflow import UnsupervisedDCF, OneShotDCF
          UnsupervisedDCF(model="vgg16", n_epochs=1)
          OneShotDCF(n_epochs=1, nb_augment=1)
          print("smoke test passed")
          PY
